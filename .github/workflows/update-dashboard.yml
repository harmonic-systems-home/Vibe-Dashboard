name: Update Dashboard Data

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at 4 AM Pacific (12 PM UTC)
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests python-dateutil

      - name: Install tokei for LOC counting
        run: |
          curl -L https://github.com/XAMPPRocky/tokei/releases/download/v12.1.2/tokei-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv tokei /usr/local/bin/
          tokei --version

      - name: Clone repositories
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          OWNERS: Rick-Wilson bridge-craftwork harmonic-systems-home
        run: |
          mkdir -p repos
          cd repos

          # Clone all repos across the personal account and the two orgs
          # (including forks, excluding archived)
          for owner in $OWNERS; do
            echo "== Listing repos for $owner =="
            gh repo list "$owner" --limit 200 --no-archived --json name,isFork \
              --jq '.[] | "\(.name)|\(.isFork)"' | while read line; do
                repo_name="${line%|*}"
                is_fork="${line#*|}"
                # Flat repos/ dir: skip a name already cloned from an earlier owner
                if [ -d "$repo_name" ]; then
                  echo "  Skipping $owner/$repo_name (name already cloned)"
                  continue
                fi
                echo "Cloning $owner/$repo_name (fork: $is_fork)..."
                gh repo clone "$owner/$repo_name" "$repo_name" 2>/dev/null || echo "  Failed to clone $owner/$repo_name"
            done
          done

          echo "Cloned $(ls -1 | wc -l) repositories"

      - name: Identify fork repos
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          OWNERS: Rick-Wilson bridge-craftwork harmonic-systems-home
        run: |
          # Get fork repo names across all owners (matched by name in fetch step)
          FORKS=""
          for owner in $OWNERS; do
            owner_forks=$(gh repo list "$owner" --limit 200 --no-archived --json name,isFork \
              --jq '[.[] | select(.isFork) | .name] | join(",")')
            if [ -n "$owner_forks" ]; then
              FORKS="${FORKS:+$FORKS,}$owner_forks"
            fi
          done
          echo "FORK_REPOS=$FORKS" >> $GITHUB_ENV
          echo "Identified forks: $FORKS"

      - name: Update LOC history
        run: |
          # Update LOC history with today's measurements
          python accumulate_loc_history.py \
            --path ./repos \
            --days 1 \
            --exclude-dir "home-assistant:config/blueprints" "home-assistant:config/www" "home-assistant:config/image" "home-assistant:config/custom_components" \
            --output loc_history.json

      - name: Generate dashboard data
        run: |
          # No --owner filter: the clone step already controls which repos are
          # present (Rick-Wilson + bridge-craftwork + harmonic-systems-home),
          # and repos now have org owners that wouldn't match a single --owner.
          # --owner-author auto-excludes repos whose ROOT commit was authored by
          # someone else (co-workers' repos in the shared orgs, forks whose
          # origin is upstream). --include forces-keep your repos whose first
          # commit was a template/bot; --exclude (unused now) can force-drop a
          # repo the root-author filter would otherwise keep.
          python fetch_github_data.py \
            --local \
            --path ./repos \
            --author "Rick Wilson" \
            --owner-author "Rick Wilson,113149377+Rick-Wilson@users.noreply.github.com,popperbiz@gmail.com" \
            --include "" \
            --fork-repos "$FORK_REPOS" \
            --exclude-lang "bba-mac-private:C#" \
            --exclude-dir "home-assistant:config/blueprints" "home-assistant:config/www" "home-assistant:config/image" "home-assistant:config/custom_components" \
            --output dashboard_data.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dashboard_data.json loc_history.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dashboard data [skip ci]"
            git push
          fi
